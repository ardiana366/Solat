<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Rakaat Counter</title>
    <style>
        body {
            background-color: #000;
            color: #0f0; /* Hijau neon agar kontras */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #rakaat-display {
            font-size: 15rem;
            font-weight: bold;
        }
        #status {
            font-size: 1.5rem;
            color: #888;
        }
        .info {
            position: absolute;
            bottom: 20px;
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 1rem;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="status">RAKAAT</div>
    <div id="rakaat-display">1</div>
    
    <div class="info">
        <p id="sujud-indicator">Sujud: 0/2</p>
        <button onclick="resetCounter()">RESET</button>
        <p style="font-size: 0.8rem; margin-top: 10px;">Pastikan HP di bawah bayangan tubuh saat sujud</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
