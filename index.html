<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Rakaat Counter</title>
    <style>
        body {
            background-color: #000;
            color: #0f0; /* Hijau neon agar kontras */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #rakaat-display {
            font-size: 15rem;
            font-weight: bold;
        }
        #status {
            font-size: 1.5rem;
            color: #888;
        }
        .info {
            position: absolute;
            bottom: 20px;
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 1rem;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="start-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;">
    <h2 style="color: #fff; margin-bottom: 20px;">Siap Shalat?</h2>
    <button id="btn-start" style="padding: 20px 50px; font-size: 1.5rem; background: #0f0; color: #000; border: none; border-radius: 50px; font-weight: bold; cursor: pointer;">MULAI SEKARANG</button>
    <p style="color: #888; margin-top: 15px; font-size: 0.9rem;">Klik untuk aktifkan sensor & layar</p>
</div>

    <div id="main-container">
    <div id="status">RAKAAT</div>
    <div id="rakaat-display">1</div>
    <div id="sujud-indicator">Sujud: 0/2</div>
</div>


<video id="webcam" autoplay playsinline style="display:none;"></video>
<canvas id="hidden-canvas" style="display:none;"></canvas>


    <script src="app.js"></script>
</body>
</html>
