<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Rakaat Counter</title>
    <style>
        body {
            background-color: #000;
            color: #0f0; /* Hijau neon agar kontras */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
        }
        
        /* Pastikan main-container memenuhi layar */
        #main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            width: 100%;
        }

        /* Kunci ruang tengah agar tidak meloncat */
        #rakaat-display {
            flex: 1; /* Mengisi seluruh ruang kosong di tengah */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            font-size: 60vh; /* Ukuran default untuk angka */
            line-height: 1.2;
            font-weight: 800;
            color: #0f0;
        }
        
        #status {
            margin-top: 5vh;
            font-size: 1.5rem;
            color: #888;
            letter-spacing: 5px;
        }

        #rakaat-display {
            font-size: 60vh; /* Sangat besar, memenuhi layar */
            line-height: 1;
            font-weight: 800;
            color: #0f0; /* Hijau neon agar tetap terlihat meski silau */
        }

        #sujud-indicator {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 20px;
        }

        #info-container {
            margin-bottom: 5vh;
            text-align: center;
            width: 100%;
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            text-align: center;
        }

        .btn-reset {
            background: #0f0;
            color: #fff; /* Merah untuk reset */
            border: 1px solid #444;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
        }
        
        button {
            padding: 15px 30px;
            font-size: 1rem;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="start-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; box-sizing: border-box;">
    
    <h1 style="color:#0f0; margin-bottom:10px;">Rakaat Counter</h1>
    
    <div style="margin-bottom: 20px;">
        <p style="color:#888; margin-bottom:10px;">Jumlah Rakaat:</p>
        <select id="select-rakaat" style="padding:10px; border-radius:10px; width:200px; font-size:1.2rem; background:#222; color:#fff; border:1px solid #444;">
            <option value="2">2 Rakaat</option>
            <option value="3">3 Rakaat</option>
            <option value="4" selected>4 Rakaat</option>
        </select>
    </div>

    <div style="margin-bottom: 30px;">
        <p style="color:#888; margin-bottom:10px;">Jenis Shalat:</p>
        <select id="select-jenis" style="padding:10px; border-radius:10px; width:200px; font-size:1.2rem; background:#222; color:#fff; border:1px solid #444;">
            <option value="wajib" selected>Wajib (Ada Tasyahud Awal)</option>
            <option value="sunnah">Sunnah (Langsung)</option>
        </select>
    </div>

    <button id="btn-start">MULAI SHALAT</button>

    <p style="color: #666; margin-top: 20px; font-size: 0.8rem; text-align: center;">
        Aplikasi akan meminta izin kamera untuk mendeteksi bayangan sujud.<br>
        Data video tidak dikirim ke internet (100% Offline).
    </p>
</div>

    <div id="main-container">
        <div id="status">RAKAAT</div>
        <div id="rakaat-display">1</div>

        <div id="info-container">
            <div id="sujud-indicator">SUJUD: 0/2</div>
            <button class="btn-reset" onclick="resetApp()">RESET ULANG</button>
        </div>
    </div>


<video id="webcam" autoplay playsinline style="display:none;"></video>
<canvas id="hidden-canvas" style="display:none;"></canvas>


    <script src="app.js"></script>
</body>
</html>
